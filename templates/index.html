<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;600&display=swap');

        :root {
            --pink: #ff4d6d;
            --deep: #c9184a;
            --bg: #ffe6eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url("/static/images/background.jpg") center/cover no-repeat,
                linear-gradient(135deg, var(--bg) 0%, #ffc2d1 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
            color: #590d22;
        }

        /* ─── Envelope shell ─── */
        .envelope-wrapper {
            position: relative;
            width: 340px;
            height: 220px;
            z-index: 10;
        }

        .envelope-wrapper.float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(-1deg);
            }

            50% {
                transform: translateY(-15px) rotate(1deg);
            }
        }

        .env-back {
            position: absolute;
            inset: 0;
            background: #ffb3c6 url("/static/images/envelope.jpg") center/cover;
            background-blend-mode: multiply;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .15);
        }

        /* ─── Carousel card — pops OUT of envelope when opened ─── */
        .card {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, 60px) scale(0.85);
            width: min(92vw, 480px);
            height: min(78vh, 640px);
            background: #fff0f3;
            border-radius: 18px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .22);
            overflow: hidden;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity .45s .35s ease,
                transform .5s .35s cubic-bezier(.22, 1, .36, 1);
        }

        .envelope-wrapper.open~* .card,
        body.env-open .card {
            opacity: 1;
            pointer-events: all;
            transform: translate(-50%, -54%) scale(1);
        }

        body.env-open .card.focus-letter {
            transform: translate(-50%, -54%) scale(1.04);
            box-shadow: 0 40px 100px rgba(0, 0, 0, .4);
        }

        /* ─── Slide track ─── */
        .slide-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform .45s cubic-bezier(.4, 0, .2, 1);
            will-change: transform;
        }

        .slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Photo slides */
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 6px;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Counter badge */
        .slide-counter {
            position: absolute;
            top: 8px;
            right: 10px;
            background: rgba(0, 0, 0, .45);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            pointer-events: none;
            letter-spacing: .4px;
        }

        /* ─── Letter slide (last slide) ─── */
        .slide-letter {
            flex-direction: column;
            align-items: stretch;
            padding: 0;
            overflow-y: auto;
            scrollbar-width: none;
            background: #fffbf2;
            text-align: left;
        }

        .slide-letter::-webkit-scrollbar {
            display: none;
        }

        .letter-inner {
            padding: 28px 24px 40px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Top stamp bar */
        .letter-stamp {
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .letter-stamp span {
            font-size: 30px;
            line-height: 1;
            opacity: .85;
        }

        .letter-greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 22px;
            color: var(--deep);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .letter-body {
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            line-height: 1.9;
            color: #4a2030;
            white-space: pre-wrap;
            flex: 1;
            /* lined-paper illusion */
            background-image: repeating-linear-gradient(transparent,
                    transparent 26px,
                    rgba(201, 24, 74, .1) 27px);
            background-size: 100% 27px;
            background-position: 0 30px;
            padding-bottom: 16px;
        }

        .letter-sign {
            font-family: 'Dancing Script', cursive;
            font-size: 20px;
            color: var(--deep);
            text-align: right;
            margin-top: 16px;
        }

        .letter-rose {
            text-align: center;
            font-size: 28px;
            margin-top: 8px;
            letter-spacing: 6px;
        }

        .slide-letter p {
            font-size: 14px;
            line-height: 1.65;
            color: #590d22;
        }

        /* ─── Nav arrows ─── */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, .75);
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .18);
            transition: background .2s;
            color: var(--deep);
            font-weight: 700;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, .95);
        }

        .nav-prev {
            left: 6px;
        }

        .nav-next {
            right: 6px;
        }

        .nav-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ─── Dot indicators ─── */
        .dots {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 5;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(201, 24, 74, .3);
            transition: background .2s, transform .2s;
            cursor: pointer;
        }

        .dot.active {
            background: var(--deep);
            transform: scale(1.3);
        }

        /* ─── Envelope flaps & seal ─── */
        .flap {
            position: absolute;
            inset: 0;
            background: url("/static/images/envelope.jpg") center/cover;
            background-blend-mode: multiply;
        }

        .flap-left {
            background-color: #ff99b3;
            clip-path: polygon(0 0, 50% 50%, 0 100%);
            z-index: 3;
            border-radius: 8px 0 0 8px;
        }

        .flap-right {
            background-color: #ff99b3;
            clip-path: polygon(100% 0, 50% 50%, 100% 100%);
            z-index: 4;
            border-radius: 0 8px 8px 0;
        }

        .flap-bottom {
            background-color: #ff85a3;
            clip-path: polygon(0 100%, 50% 45%, 100% 100%);
            z-index: 5;
            border-radius: 0 0 8px 8px;
        }

        .flap-top {
            background-color: #ff7096;
            clip-path: polygon(0 0, 50% 55%, 100% 0);
            transform-origin: top;
            border-radius: 8px 8px 0 0;
            z-index: 6;
            transition: transform .5s .6s, z-index 0s .6s;
        }

        .envelope-wrapper.open .flap-top {
            transform: rotateX(180deg);
            z-index: 1;
            transition: transform .5s, z-index 0s .25s;
        }

        .seal {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: #a4133c;
            border-radius: 50%;
            z-index: 7;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, .2);
            cursor: pointer;
            transition: opacity .3s .6s;
        }

        .envelope-wrapper.open .seal {
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s 0s;
        }

        /* ─── Action button ─── */
        .action-btn {
            position: relative;
            margin-top: 30px;
            background: linear-gradient(135deg, var(--pink), var(--deep));
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(201, 24, 74, .3);
            transition: transform .2s, margin-top .5s cubic-bezier(.22, 1, .36, 1);
            z-index: 60;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        /* When card is open, push button down below card */
        body.env-open .action-btn {
            margin-top: min(80vh, 660px);
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 0;
        }

        body.env-open .action-btn:hover {
            transform: translateX(-50%) scale(1.05);
        }

        /* ─── Particles (rose emoji) ─── */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 28px;
            line-height: 1;
            opacity: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ─── Swipe hint toast ─── */
        @keyframes bounceLeft {

            0%,
            100% {
                transform: translateX(-50%) translateX(0);
            }

            40% {
                transform: translateX(-50%) translateX(-8px);
            }

            70% {
                transform: translateX(-50%) translateX(3px);
            }
        }

        .swipe-hint {
            position: absolute;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, .5);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            padding: 9px 22px;
            border-radius: 24px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity .4s;
        }

        .swipe-hint.show {
            opacity: 1;
            animation: bounceLeft 1.4s ease-in-out 0.3s infinite;
        }

        @media (max-width: 600px) {
            .envelope-wrapper {
                transform: scale(0.88);
            }
        }
    </style>
</head>

<body>
    <div class="envelope-wrapper float" id="envContainer">
        <div class="env-back"></div>

        <!-- ── Carousel card ── -->
        <div class="card" id="card">
            <div class="slide-track" id="slideTrack">

                <!-- Photo & Video slides (Jinja) -->
                {% for slide in slides %}
                <div class="slide" data-kind="{{ slide.kind }}">
                    {% if slide.kind == 'video' %}
                    <video data-src="/static/{{ slide.src }}" autoplay muted playsinline loop
                        style="width:100%;height:100%;object-fit:cover;border-radius:6px;"></video>
                    {% else %}
                    <img data-src="/static/{{ slide.src }}" alt="Memory {{ loop.index }}" draggable="false">
                    {% endif %}
                    <span class="slide-counter">{{ loop.index }} / {{ slides|length + 1 }}</span>
                </div>
                {% endfor %}

                <!-- Final slide: the letter -->
                <div class="slide slide-letter" id="letterSlide">
                    <div class="letter-inner">
                        <div class="letter-stamp"><span>💌🌹</span></div>
                        <div class="letter-greeting">Gửi người thương của anh,</div>
                        <div class="letter-body">{{ message }}</div>
                        <div class="letter-sign">Của em mãi mãi 🌹</div>
                        <div class="letter-rose">🌹 🌸 🌹</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nav -->
        <button class="nav-btn nav-prev hidden" id="navPrev">‹</button>
        <button class="nav-btn nav-next" id="navNext">›</button>

        <!-- Dots -->
        <div class="dots" id="dots"></div>

        <!-- Swipe hint -->
        <div class="swipe-hint" id="swipeHint">👉 Lướt phải để xem chuyện đôi mình</div>
    </div>

    <div class="flap flap-left"></div>
    <div class="flap flap-right"></div>
    <div class="flap flap-bottom"></div>
    <div class="flap flap-top"></div>
    <div class="seal" id="sealBtn">💌</div>
    </div>

    <button class="action-btn" id="toggleBtn">Mở Thư Ngay 🌸</button>

    <audio id="bgMusic" loop autoplay>
        <source src="/music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('toggleBtn');
        const sealBtn = document.getElementById('sealBtn');
        const env = document.getElementById('envContainer');
        const track = document.getElementById('slideTrack');
        const navPrev = document.getElementById('navPrev');
        const navNext = document.getElementById('navNext');
        const dotsEl = document.getElementById('dots');
        const music = document.getElementById('bgMusic');

        const totalSlides = track.children.length;
        let current = 0;
        let isOpen = false;

        /* ── Build dots ── */
        for (let i = 0; i < totalSlides; i++) {
            const d = document.createElement('div');
            d.className = 'dot' + (i === 0 ? ' active' : '');
            d.addEventListener('click', () => goTo(i));
            dotsEl.appendChild(d);
        }

        /* ── Lazy loader: only load media within ±2 of current slide ── */
        function loadNearby(n) {
            const slideEls = Array.from(track.children);
            for (let i = Math.max(0, n - 3); i <= Math.min(slideEls.length - 1, n + 3); i++) {
                const img = slideEls[i].querySelector('img[data-src]');
                if (img) { img.src = img.dataset.src; img.removeAttribute('data-src'); }
                const vid = slideEls[i].querySelector('video[data-src]');
                if (vid) { vid.src = vid.dataset.src; vid.removeAttribute('data-src'); vid.load(); }
            }
        }

        function goTo(n) {
            // Pause outgoing video
            const leaving = track.children[current];
            if (leaving) { const v = leaving.querySelector('video'); if (v) v.pause(); }

            current = Math.max(0, Math.min(n, totalSlides - 1));
            track.style.transform = `translateX(-${current * 100}%)`;
            loadNearby(current);

            // Play incoming video
            const entering = track.children[current];
            if (entering) { const v = entering.querySelector('video'); if (v) v.play().catch(() => { }); }

            dotsEl.querySelectorAll('.dot').forEach((d, i) =>
                d.classList.toggle('active', i === current));
            navPrev.classList.toggle('hidden', current === 0);
            navNext.classList.toggle('hidden', current === totalSlides - 1);

            // Zoom effect on letter slide
            card.classList.toggle('focus-letter', current === totalSlides - 1);
        }

        navPrev.addEventListener('click', () => goTo(current - 1));
        navNext.addEventListener('click', () => goTo(current + 1));

        /* ── Touch/swipe ── */
        let touchX = null;
        const card = document.getElementById('card');
        card.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
        card.addEventListener('touchend', e => {
            if (touchX === null) return;
            const dx = e.changedTouches[0].clientX - touchX;
            if (Math.abs(dx) > 40) {
                goTo(current + (dx < 0 ? 1 : -1));
                const hint = document.getElementById('swipeHint');
                if (hint) hint.classList.remove('show');
            }
            touchX = null;
        });

        /* ── Particles (unchanged logic) ── */
        const ROSES = ['🌹', '🌹', '🌸', '🌷', '🌹', '🌸'];

        function makeRose(left, top, size) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = ROSES[Math.floor(Math.random() * ROSES.length)];
            p.style.cssText = `font-size:${size}px;left:${left}px;top:${top}px;`;
            document.body.appendChild(p);
            return p;
        }

        function burstParticles() {
            const r = env.getBoundingClientRect();
            const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
            for (let i = 0; i < 18; i++) {
                const size = 22 + Math.random() * 18;
                const angle = (i / 18) * 2 * Math.PI + (Math.random() - .5) * .4;
                const dist = 100 + Math.random() * (Math.min(innerWidth, innerHeight) * .30);
                const p = makeRose(cx - size / 2, cy - size / 2, size);
                setTimeout(() => {
                    p.style.transition = 'none'; p.style.opacity = '1'; p.style.transform = 'scale(0.3)';
                    requestAnimationFrame(() => requestAnimationFrame(() => {
                        p.style.transition = 'transform 1.1s cubic-bezier(.2,0,.4,1), opacity .4s .7s';
                        p.style.transform = `translate(${Math.cos(angle) * dist}px,${Math.sin(angle) * dist}px) scale(1) rotate(${(Math.random() - .5) * 30}deg)`;
                        p.style.opacity = '0';
                    }));
                    setTimeout(() => p.remove(), 1400);
                }, i * 45 + Math.random() * 60);
            }
        }

        let rainTimer = null;
        function spawnRain() {
            const size = 20 + Math.random() * 18;
            const x = Math.random() * (innerWidth - size);
            const dur = 2500 + Math.random() * 2000;
            const tilt = (Math.random() - .5) * 25;
            const p = makeRose(x, -size - 10, size);
            p.style.cssText += `opacity:.9;transition:transform ${dur}ms linear, opacity .4s ${dur - 350}ms;transform:translateY(0) rotate(${tilt}deg);`;
            requestAnimationFrame(() => requestAnimationFrame(() => {
                p.style.transform = `translateY(${innerHeight + size + 20}px) rotate(${tilt + (Math.random() - .5) * 50}deg)`;
                p.style.opacity = '0';
            }));
            setTimeout(() => p.remove(), dur + 500);
        }
        function startRain() { if (!rainTimer) rainTimer = setInterval(spawnRain, 300); }
        function stopRain() { clearInterval(rainTimer); rainTimer = null; }
        function clearAll() { document.querySelectorAll('.particle').forEach(p => p.remove()); }

        /* ── Toggle ── */
        function open() {
            music.currentTime = 35;
            music.play().catch(() => { });
            env.classList.remove('float');
            env.classList.add('open');
            document.body.classList.add('env-open');
            btn.textContent = 'Đóng Phong Bì 🥺';
            isOpen = true;
            goTo(0);
            setTimeout(burstParticles, 400);
            setTimeout(startRain, 600);
            // Show swipe hint then fade out
            const hint = document.getElementById('swipeHint');
            if (hint) {
                setTimeout(() => hint.classList.add('show'), 600);
                setTimeout(() => hint.classList.remove('show'), 3000);
            }
        }

        function close() {
            env.classList.remove('open');
            env.classList.add('float');
            document.body.classList.remove('env-open'); // hides card
            btn.textContent = 'Mở Thư Ngay 🌸';
            isOpen = false;
            stopRain(); clearAll();
        }

        function toggle() { isOpen ? close() : open(); }

        btn.addEventListener('click', toggle);
        sealBtn.addEventListener('click', toggle);

        // Force autoplay on first interaction
        document.body.addEventListener('click', () => {
            music.currentTime = 35;
            if (music.paused) music.play().catch(() => { });
        }, { once: true });
    </script>
</body>

</html>
