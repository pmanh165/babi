<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;600&display=swap');

        :root {
            --bg-pink: #ffe6eb;
            --text-color: #590d22;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url("{{ url_for('static', path='images/background.jpg') }}") center/cover no-repeat,
            linear-gradient(135deg, var(--bg-pink) 0%, #ffc2d1 100%);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Decorative Side Images */
        .decor {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: 90vh;
            max-width: 280px;
            object-fit: contain;
            pointer-events: none;
            z-index: 0;
            opacity: 0.85;
        }

        .decor-left {
            left: 2%;
        }

        .decor-right {
            right: 2%;
            transform: translateY(-50%) scaleX(-1);
        }

        /* The Envelope System */
        .envelope-wrapper {
            position: relative;
            width: 340px;
            height: 220px;
            z-index: 10;
            margin-top: 40px;
        }

        .envelope-wrapper.float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(-1deg);
            }

            50% {
                transform: translateY(-15px) rotate(1deg);
            }

            100% {
                transform: translateY(0px) rotate(-1deg);
            }
        }

        /* Layers */
        .env-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffb3c6;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            background-image: url("{{ url_for('static', path='images/envelope.jpg') }}");
            background-size: cover;
            background-blend-mode: multiply;
            z-index: 0;
        }

        .letter {
            position: absolute;
            bottom: 5px;
            left: 5%;
            width: 90%;
            height: 95%;
            background: #fff0f3;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
            overflow-y: auto;
            scrollbar-width: none;

            /* Z-index & transform */
            z-index: 2;
            transform: translateY(0);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .letter::-webkit-scrollbar {
            display: none;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-40px);
            transition: transform 0.6s 0.4s cubic-bezier(0.4, 0, 0.2, 1), height 0.6s 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            height: 320px;
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: url("{{ url_for('static', path='images/envelope.jpg') }}");
            background-size: cover;
            background-blend-mode: multiply;
        }

        .flap-left {
            background-color: #ff99b3;
            clip-path: polygon(0 0, 50% 50%, 0 100%);
            z-index: 3;
            border-radius: 8px 0 0 8px;
        }

        .flap-right {
            background-color: #ff99b3;
            clip-path: polygon(100% 0, 50% 50%, 100% 100%);
            z-index: 4;
            border-radius: 0 8px 8px 0;
        }

        .flap-bottom {
            background-color: #ff85a3;
            clip-path: polygon(0 100%, 50% 45%, 100% 100%);
            z-index: 5;
            border-radius: 0 0 8px 8px;
        }

        .flap-top {
            background-color: #ff7096;
            clip-path: polygon(0 0, 50% 55%, 100% 0);
            transform-origin: top;
            border-radius: 8px 8px 0 0;

            /* Magic Z-index flipping */
            z-index: 6;
            transition: transform 0.5s 0.6s, z-index 0s 0.6s;
        }

        .envelope-wrapper.open .flap-top {
            transform: rotateX(180deg);
            z-index: 1;
            transition: transform 0.5s, z-index 0s 0.25s;
        }

        .seal {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: #a4133c;
            border-radius: 50%;
            z-index: 7;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: opacity 0.3s 0.6s;
            cursor: pointer;
        }

        .envelope-wrapper.open .seal {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s 0s;
        }

        .action-btn {
            margin-top: 80px;
            background: linear-gradient(135deg, #ff4d6d 0%, #c9184a 100%);
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(201, 24, 74, 0.3);
            transition: all 0.2s;
            z-index: 20;
        }

        .action-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #c9184a 0%, #ff4d6d 100%);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 34px;
            color: #c9184a;
            margin: 0 0 15px 0;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 10px;
            color: #590d22;
        }

        @media (max-width: 768px) {
            .decor {
                opacity: 0.3;
                height: 50vh;
            }

            .envelope-wrapper {
                transform: scale(0.9);
            }
        }
    </style>
</head>

<body>
    <img src="{{ url_for('static', path='images/side_decor.jpg') }}" class="decor decor-left"
        onerror="this.style.display='none'">
    <img src="{{ url_for('static', path='images/side_decor.jpg') }}" class="decor decor-right"
        onerror="this.style.display='none'">

    <div class="envelope-wrapper float" id="envContainer">
        <div class="env-back"></div>

        <!-- The Sliding Letter -->
        <div class="letter">
            <h1>For You ✨</h1>
            {% if images %}
            <img src="{{ url_for('static', path=images[0]) }}" alt="Gift"
                style="width:100%; border-radius:8px; margin-bottom:15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"
                onerror="this.style.display='none'">
            {% endif %}
            <p>{{ message }}</p>
        </div>

        <div class="flap flap-left"></div>
        <div class="flap flap-right"></div>
        <div class="flap flap-bottom"></div>
        <div class="flap flap-top"></div>

        <div class="seal" id="sealBtn">💌</div>
    </div>

    <button class="action-btn" id="toggleBtn">Mở Thư Ngay 🌸</button>

    <audio id="bgMusic" loop autoplay>
        <source src="/music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('toggleBtn');
        const sealBtn = document.getElementById('sealBtn');
        const env = document.getElementById('envContainer');
        const music = document.getElementById('bgMusic');
        let isOpen = false;

        // Force play on first click anywhere (bypasses browser autoplay restrictions)
        document.body.addEventListener('click', () => {
            if (music.paused) music.play().catch(e => console.log('Autoplay restriction:', e));
        }, { once: true });

        function toggleEnvelope() {
            if (!isOpen) {
                music.play().catch(e => { });
                env.classList.remove('float');
                env.classList.add('open');
                btn.innerHTML = 'Đóng Phong Bì 🥺';
                isOpen = true;
            } else {
                env.classList.remove('open');
                env.classList.add('float');
                btn.innerHTML = 'Tiếp Tục Đọc 🌸';
                isOpen = false;
            }
        }

        btn.addEventListener('click', toggleEnvelope);
        sealBtn.addEventListener('click', toggleEnvelope);
    </script>
</body>

</html>
